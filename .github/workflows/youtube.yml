name: Upload youtube

on:
  repository_dispatch:
    types: [youtube_request]

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Send URLs to server
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          echo "Sending URLs"

          curl -X POST "https://drive-ygsv.onrender.com/upload-youtube" \
            -H "Content-Type: application/json" \
            -d "$(echo "$PAYLOAD" | jq '{videos: ((.videos // .url) | map(if type == "string" then {url: .} else . end)), token: .token}')" \
            --fail-with-body \
            --show-error
