name: Download website

on:
  repository_dispatch:
    types: [download_website]

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Mirror website and upload to Google Drive
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          URL=$(echo "$PAYLOAD" | jq -r '.url')
          echo "Mirroring URL: ${URL}"

          echo "$PAYLOAD" | jq 'if .token | type == "string" then .token | fromjson else .token end' > token.json

          sudo apt-get update
          sudo apt-get install -y httrack zip jq
          python3 -m pip install -U google-api-python-client google-auth google-auth-oauthlib

          DOMAIN=$(echo "$URL" | sed -E 's|^https?://([^/:]+).*|\1|')
          OUTPUT_DIR="website"
          ZIP_FILE="${DOMAIN}.zip"

          httrack "${URL}" \
            -O "${OUTPUT_DIR}" \
            "+*.${DOMAIN}/*" \
            "-*" \
            -r99999 \
            -#L999999999 \
            -%v \
            -s0 \
            --robots=0 \
            --disable-security-limits \
            -A1000000000

          zip -r "${ZIP_FILE}" "${OUTPUT_DIR}"

          echo "Uploading to Google Drive: ${ZIP_FILE}"

          export ZIP_FILE
          python3 <<'EOF'
          import json
          import os

          from google.auth.transport.requests import Request
          from google.oauth2.credentials import Credentials
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          file_path = os.environ["ZIP_FILE"]
          file_name = os.path.basename(file_path)

          with open("token.json", encoding="utf-8") as f:
              token_info = json.load(f)

          scopes = ["https://www.googleapis.com/auth/drive"]

          if token_info.get("type") == "service_account":
              creds = service_account.Credentials.from_service_account_info(
                  token_info, scopes=scopes
              )
          else:
              creds = Credentials.from_authorized_user_info(token_info, scopes=scopes)
              if creds.expired and creds.refresh_token:
                  creds.refresh(Request())

          service = build("drive", "v3", credentials=creds)
          media = MediaFileUpload(file_path, mimetype="application/zip", resumable=True)
          uploaded = (
              service.files()
              .create(body={"name": file_name}, media_body=media, fields="id,name,webViewLink")
              .execute()
          )

          print(json.dumps(uploaded, ensure_ascii=False, indent=2))
          EOF
