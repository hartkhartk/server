name: Download youtube

on:
  repository_dispatch:
    types: [download_youtube]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          pip install "yt-dlp[default]"

      - name: Download and upload video
        env:
          URL: ${{ github.event.client_payload.url }}
        run: |
          echo "Downloading URL: ${URL}"

          FILE=$(yt-dlp --cookies cookies.txt \
            --remote-components ejs:github \
            -f "bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/bestvideo[height<=720]+bestaudio/best[height<=720]" \
            --merge-output-format mp4 \
            -o "%(title)s.%(ext)s" \
            --print after_move:filepath \
            "${URL}")

          TITLE=$(basename "$FILE" .mp4)
          echo "Uploading file: ${FILE}"
          echo "Video name: ${TITLE}"

          export TITLE FILE
          python3 <<'EOF'
          import base64
          import json
          import os

          with open(os.environ["FILE"], "rb") as f:
              payload = {
                  "name": os.environ["TITLE"],
                  "file": base64.b64encode(f.read()).decode(),
              }

          with open("payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f)
          EOF

          curl -X POST "https://drive-ygsv.onrender.com/save-youtube" \
            -F "file=@${FILE}" \
            -F "name=${TITLE}" \
            --fail-with-body \
            --show-error