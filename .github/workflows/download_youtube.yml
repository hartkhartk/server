name: Download youtube

on:
  repository_dispatch:
    types: [download_youtube]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Download and upload video
        run: |
          URL="${{ github.event.client_payload.url }}"
          echo "Downloading URL: $URL"

          yt-dlp --cookies cookies.txt -o "download.%(ext)s" "$URL"

          FILE=$(ls download.* | head -1)
          echo "Uploading file: $FILE"

          curl -X POST "https://drive-ygsv.onrender.com/save-youtube" \
            -F "file=@${FILE}" \
            --fail-with-body \
            --show-error
