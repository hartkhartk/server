name: Download youtube

on:
  repository_dispatch:
    types: [download_youtube]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          python -m pip install -U "yt-dlp[default]" \
            google-api-python-client google-auth google-auth-oauthlib

      - name: Download and upload to Google Drive
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          URL=$(echo "$PAYLOAD" | jq -r '.url')
          echo "Downloading URL: ${URL}"

          echo "$PAYLOAD" | jq 'if .token | type == "string" then .token | fromjson else .token end' > token.json

          FILE=$(yt-dlp --cookies cookies.txt \
            --remote-components ejs:github \
            -f "bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/bestvideo[height<=720]+bestaudio/best[height<=720]" \
            --merge-output-format mp4 \
            -o "%(title)s.%(ext)s" \
            --print after_move:filepath \
            "${URL}")

          echo "Uploading to Google Drive: ${FILE}"

          export FILE
          python3 <<'EOF'
          import json
          import os

          from google.auth.transport.requests import Request
          from google.oauth2.credentials import Credentials
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          file_path = os.environ["FILE"]
          file_name = os.path.basename(file_path)

          with open("token.json", encoding="utf-8") as f:
              token_info = json.load(f)

          scopes = ["https://www.googleapis.com/auth/drive.file"]

          if token_info.get("type") == "service_account":
              creds = service_account.Credentials.from_service_account_info(
                  token_info, scopes=scopes
              )
          else:
              creds = Credentials.from_authorized_user_info(token_info, scopes=scopes)
              if creds.expired and creds.refresh_token:
                  creds.refresh(Request())

          service = build("drive", "v3", credentials=creds)
          media = MediaFileUpload(file_path, mimetype="video/mp4", resumable=True)
          uploaded = (
              service.files()
              .create(body={"name": file_name}, media_body=media, fields="id,name,webViewLink")
              .execute()
          )

          print(json.dumps(uploaded, ensure_ascii=False, indent=2))
          EOF
