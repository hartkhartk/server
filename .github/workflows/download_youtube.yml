name: Download youtube

on:
  repository_dispatch:
    types: [download_youtube]

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          pip install "yt-dlp[default]"

      - name: Download and upload video
        env:
          URL: ${{ github.event.client_payload.url }}
        run: |
          echo "Downloading URL: ${URL}"

          TITLE=$(yt-dlp --cookies cookies.txt \
            --remote-components ejs:github \
            --print "%(title)s" \
            --skip-download \
            "${URL}")

          yt-dlp --cookies cookies.txt \
            --remote-components ejs:github \
            -o "download.%(ext)s" \
            "${URL}"

          FILE=$(ls download.* | head -1)
          echo "Uploading file: ${FILE}"
          echo "Video name: ${TITLE}"

          export TITLE FILE
          python3 <<'EOF'
          import base64
          import json
          import os

          with open(os.environ["FILE"], "rb") as f:
              payload = {
                  "name": os.environ["TITLE"],
                  "file": base64.b64encode(f.read()).decode(),
              }

          with open("payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f)
          EOF

          curl -X POST "https://drive-ygsv.onrender.com/save-youtube" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            --fail-with-body \
            --show-error
