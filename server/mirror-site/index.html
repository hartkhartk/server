<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שיקוף אתר</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ניהול קבצים</h1>
            <p>שיקוף אתר</p>
        </header>

        <div id="toast" class="toast" role="status"></div>

        <section class="card">
            <h2>שיקוף אתר</h2>
            <form id="upload-form" class="upload-form">
                <input
                    type="password"
                    id="token-input"
                    placeholder="GitHub Token"
                    required
                    autocomplete="off"
                >
                <div class="upload-row">
                    <input
                        type="url"
                        id="url-input"
                        placeholder="https://example.com"
                        required
                        autocomplete="off"
                    >
                    <button type="submit" id="upload-btn">שלח</button>
                </div>
            </form>
        </section>

        <section id="response-section" class="card response-section hidden">
            <h2>תגובת השרת</h2>
            <p id="response-status" class="response-status"></p>
            <pre id="response-body" class="response-body"></pre>
        </section>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
