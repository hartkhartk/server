<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הורדת יוטיוב לדרייב</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ניהול קבצים</h1>
            <p>הורדת סרטוני יוטיוב ל-Google Drive</p>
        </header>

        <div id="toast" class="toast" role="status"></div>

        <section class="card">
            <h2>הורדה ל-Google Drive</h2>
            <form id="upload-form" class="upload-form">
                <input
                    type="password"
                    id="token-input"
                    placeholder="GitHub Token"
                    required
                    autocomplete="off"
                >
                <label for="drive-token-input" class="file-picker">
                    <span class="file-picker-text">בחר token.json ל-Google Drive</span>
                    <input
                        type="file"
                        id="drive-token-input"
                        accept=".json,application/json"
                        required
                    >
                </label>
                <p id="drive-token-name" class="file-name"></p>
                <textarea
                    id="url-input"
                    placeholder="קישור בשורה&#10;https://www.youtube.com/watch?v=..."
                    required
                    rows="6"
                    spellcheck="false"
                ></textarea>
                <button type="submit" id="upload-btn">הורד לדרייב</button>
            </form>
        </section>

        <section id="response-section" class="card response-section hidden">
            <h2>תגובת השרת</h2>
            <p id="response-status" class="response-status"></p>
            <pre id="response-body" class="response-body"></pre>
        </section>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
