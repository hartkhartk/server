<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול קבצים</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ניהול קבצים</h1>
            <p>העלאת קישורים</p>
        </header>

        <div id="toast" class="toast" role="status"></div>

        <section class="card">
            <h2>העלאת קבצים מקישורים</h2>
            <form id="upload-form" class="upload-form">
                <input
                    type="password"
                    id="token-input"
                    placeholder="GitHub Token"
                    required
                    autocomplete="off"
                >
                <textarea
                    id="url-input"
                    placeholder="קישור בשורה&#10;https://example.com/file.pdf"
                    required
                    rows="6"
                    spellcheck="false"
                ></textarea>
                <button type="submit" id="upload-btn">העלה</button>
            </form>
        </section>

        <section id="response-section" class="card response-section hidden">
            <h2>תגובת השרת</h2>
            <p id="response-status" class="response-status"></p>
            <pre id="response-body" class="response-body"></pre>
        </section>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
