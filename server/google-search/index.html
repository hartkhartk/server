<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חיפוש גוגל</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ניהול קבצים</h1>
            <p>חיפוש בגוגל</p>
        </header>

        <div id="toast" class="toast" role="status"></div>

        <section class="card">
            <h2>חיפוש</h2>
            <form id="search-form" class="upload-form">
                <input
                    type="password"
                    id="token-input"
                    placeholder="GitHub Token"
                    required
                    autocomplete="off"
                >
                <input
                    type="text"
                    id="text-input"
                    placeholder="טקסט חיפוש"
                    required
                    autocomplete="off"
                >
                <input
                    type="text"
                    id="site-input"
                    placeholder="אתר לחיפוש (אופציונלי)"
                    autocomplete="off"
                >
                <input
                    type="text"
                    id="tag-input"
                    placeholder="תגית (אופציונלי)"
                    autocomplete="off"
                >
                <button type="submit" id="search-btn">חפש</button>
            </form>
        </section>

        <section id="response-section" class="card response-section hidden">
            <h2>תגובת השרת</h2>
            <p id="response-status" class="response-status"></p>
            <pre id="response-body" class="response-body"></pre>
        </section>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
