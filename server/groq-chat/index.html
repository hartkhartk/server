<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צ'אט AI</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ניהול קבצים</h1>
            <p>צ'אט AI</p>
        </header>

        <div id="toast" class="toast" role="status"></div>

        <section class="card">
            <h2>שליחת פרומפט</h2>
            <form id="chat-form" class="upload-form">
                <input
                    type="password"
                    id="token-input"
                    placeholder="GitHub Token"
                    required
                    autocomplete="off"
                >

                <label class="form-option">
                    <input type="checkbox" id="zip-input">
                    הצפנה (קובץ md מהמחשב)
                </label>

                <div id="text-input-wrap">
                    <textarea
                        id="prompt-input"
                        placeholder="פרומפט ל-AI"
                        rows="6"
                        spellcheck="false"
                    ></textarea>
                </div>

                <div id="file-input-wrap" hidden>
                    <label for="file-input" class="file-picker">
                        <span class="file-picker-text">בחר קובץ md</span>
                        <input
                            type="file"
                            id="file-input"
                            accept=".md,text/markdown"
                        >
                    </label>
                    <p id="file-name" class="file-name"></p>
                </div>

                <button type="submit" id="chat-btn">שלח</button>
            </form>
        </section>

        <section id="response-section" class="card response-section hidden">
            <h2>תגובת השרת</h2>
            <p id="response-status" class="response-status"></p>
            <pre id="response-body" class="response-body"></pre>
        </section>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
